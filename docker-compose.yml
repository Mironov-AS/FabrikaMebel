services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contractpro-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: contractpro-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
    expose:
      - "3001"
