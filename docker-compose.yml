services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: contractpro-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      DB_PATH: ./data/database.sqlite
    volumes:
      # SQLite database — persisted across container restarts
      - sqlite_data:/app/data
      # Uploaded files — persisted across container restarts
      - uploads_data:/app/uploads
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contractpro-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  sqlite_data:
    driver: local
    name: contractpro_sqlite
  uploads_data:
    driver: local
    name: contractpro_uploads
